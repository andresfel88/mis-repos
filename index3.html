<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo APK - Repositorio de Soporte Técnico AT-APK</title>

        /* --- ESTILOS DE DOCUMENTACIÓN TÉCNICA / INFORME SOPORTE --- */
        :root {
            --bg-page: #e3e2e0; 
            --bg-canvas: #f2efe9; 
            --card-bg: #ffffff; 
            --text-main: #1d1d1f;
            --text-muted: #515154;
            --accent-gray: #86868b;
            --border-card: rgba(0, 0, 0, 0.06);
            --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVBAR SIMULADO --- */
        .nav-bar {
            background-color: rgba(29, 29, 31, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-bar a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-bar a:hover {
            opacity: 1;
        }

        .main-wrapper {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .apple-container {
            width: 100%;
            max-width: 1140px;
            background-color: var(--bg-canvas);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.6px;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 35px 0;
            line-height: 1.4;
        }
