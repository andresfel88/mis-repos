<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo APK - Repositorio de Soporte Técnico AT-APK</title>
    <style>
        :root {
            --bg-page: #e3e2e0; 
            --bg-canvas: #f2efe9; 
            --card-bg: #ffffff; 
            --text-main: #1d1d1f;
            --text-muted: #515154;
            --accent-gray: #86868b;
            --border-card: rgba(0, 0, 0, 0.06);
            --shadow-card: 0 10px 30px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .nav-bar {
            background-color: rgba(29, 29, 31, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-bar a {
            color: #f5f5f7;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.2px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-bar a:hover {
            opacity: 1;
        }

        .main-wrapper {
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .apple-container {
            width: 100%;
            max-width: 1140px;
            background-color: var(--bg-canvas);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            box-sizing: border-box;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.6px;
            margin: 0 0 8px 0;
            color: var(--text-main);
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin: 0 0 35px 0;
            line-height: 1.4;
        }

        .grid-devices {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .card-device {
            background-color: var(--card-bg);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-card);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .card-tag {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 14px;
            color: var(--text-main);
        }

        .img-container {
            width: 100%;
            height: 150px;
            background-color: #ffffff;
            border-radius: 14px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
            box-sizing: border-box;
        }

        .img-container.dark-bg {
            background-color: #1a1a1a;
        }

        .card-heading {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 12px 0;
            letter-spacing: -0.2px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 6px;
        }

        .component-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .component-item {
            margin-bottom: 10px;
            font-size: 12px;
            line-height: 1.4;
        }

        .component-name {
            font-weight: 700;
            color: var(--text-main);
            display: block;
        }

        .component-desc {
            color: var(--text-muted);
        }

        .tech-specs-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-card);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-card);
            margin-bottom: 35px;
        }

        .clickable-specs-text {
            font-size: 12.5px;
            color: var(--text-muted);
            margin: 0;
            line-height: 1.6;
            text-decoration: underline;
            text-decoration-color: rgba(0, 0, 0, 0.2);
            text-underline-offset: 3px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .clickable-specs-text:hover {
            color: #0066cc;
            text-decoration-color: #0066cc;
        }

        .tech-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            text-align: left;
            margin-top: 15px;
        }

        .tech-table th, .tech-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .tech-table th {
            background-color: #f5f5f7;
            font-weight: 700;
        }

        .ninja-security-box {
            background-color: #f5f5f7;
            border: 1px solid var(--border-card);
            border-radius: 20px;
            padding: 25px;
            margin: 35px 0;
            text-align: left;
        }

        .ninja-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ninja-text-underlined {
            font-size: 12.5px;
            color: var(--text-muted);
            line-height: 1.6;
            margin: 0;
            text-decoration: underline;
            text-decoration-color: rgba(0, 0, 0, 0.15);
            text-underline-offset: 3px;
        }

        .stealth-link {
            color: #0066cc;
            font-size: 12.5px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            display: inline;
            background-color: rgba(0, 102, 204, 0.08);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .stealth-link:hover {
            background-color: rgba(0, 102, 204, 0.15);
            text-decoration: underline;
        }

        .faq-section {
            margin: 35px 0;
        }

        .faq-item {
            margin-bottom: 15px;
            background: rgba(255,255,255,0.5);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid rgba(0,0,0,0.
